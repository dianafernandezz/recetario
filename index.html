<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario de Repostería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        
        body {
            background-color: #ffd9e5 !important; 
        }
        .text-sweet { color: #d63384; }
        .bg-sweet { background-color: #d63384; }
    </style>
</head>
<body>

    <div class="container my-5">
        <h2 class="text-center text-sweet mb-4">
            <i class="bi bi-cake2"></i> Mi Recetario de Repostería
        </h2>

        <div class="row mb-4 justify-content-center">
            <div class="col-md-6">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="txtBuscar" class="form-control border-start-0 ps-0" placeholder="Buscar postre o ingrediente (ej. naranja, maizena)...">
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        <i class="bi bi-plus-circle-fill me-1"></i> Nueva Receta Dulce
                    </div>
                    <div class="card-body">
                        <form id="formReceta">
                            <div class="mb-3">
                                <label class="form-label">Nombre del Postre</label>
                                <input type="text" id="txtNombre" class="form-control" required placeholder="Ej. Pasta Frola, Budín de Pan">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select id="cmbCategoria" class="form-select">
                                    <option value="Tortas y Tartas">Tortas y Tartas</option>
                                    <option value="Masas y Masitas">Masas y Masitas (Galletitas, Alfajores)</option>
                                    <option value="Postres de Cuchara">Postres de Cuchara (Flanes, Cremas)</option>
                                    <option value="Tradicionales">Tradicionales Dulces</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ingredientes (Separados por comas)</label>
                                <textarea id="txtIngredientes" class="form-control" rows="3" required placeholder="Ej. Harina, Azúcar, Esencia de vainilla, Dulce de leche"></textarea>
                                <div class="form-text">Separa cada ingrediente con una coma (,).</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Pasos de Preparación</label>
                                <textarea id="txtPasos" class="form-control" rows="4" required placeholder="Termina cada oración o instrucción con un punto final. Así el sistema creará los pasos automáticamente."></textarea>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Agregar al Recetario</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <h5 class="text-secondary mb-3">
                    <i class="bi bi-journal-bookmark"></i> Catálogo de Dulces
                </h5>
                <div id="contenedorRecetas" class="row g-3">
                    <div class="col-12 text-center text-muted py-5" id="msgVacio">
                        <i class="bi bi-cookie fs-1 d-block mb-2 text-warning"></i>
                        No hay recetas de repostería que coincidan con la búsqueda.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
